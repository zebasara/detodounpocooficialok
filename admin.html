<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — De Todo Un Poco</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#F67280;--mauve:#C06C84;--ocean:#355C7D;--peach:#F8B185;
  --warm-white:#FAF8F5;--off-white:#F2EEE8;--charcoal:#1C1C1E;
  --gray:#6B6B6B;--light-gray:#E8E4DF;--danger:#E53935;
  --font-display:'Playfair Display',serif;--font-body:'Outfit',sans-serif;
  --radius:12px;--shadow-sm:0 2px 8px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:#EDEAE5;color:var(--charcoal);min-height:100vh}

/* AUTH */
#authGate{position:fixed;inset:0;z-index:1000;background:var(--charcoal);display:flex;align-items:center;justify-content:center;padding:1rem}
.auth-box{background:white;border-radius:20px;padding:2.5rem 2rem;text-align:center;width:min(380px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.35)}
.auth-logo{height:64px;object-fit:contain;margin-bottom:1rem}
.auth-box h2{font-family:var(--font-display);font-size:1.3rem;margin-bottom:.3rem}
.auth-box p{color:var(--gray);font-size:.83rem;margin-bottom:1.5rem}
.auth-input{width:100%;padding:11px 14px;border:1.5px solid var(--light-gray);border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;margin-bottom:.9rem;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--coral)}
.btn-primary{width:100%;padding:13px;background:var(--charcoal);color:white;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.auth-error{color:var(--danger);font-size:.8rem;margin-top:.4rem;display:none}

/* LAYOUT */
.admin-wrap{display:none}
.admin-wrap.on{display:block}
header{background:var(--charcoal);color:white;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
header .brand{display:flex;align-items:center;gap:10px}
header img{height:38px}
header h1{font-family:var(--font-display);font-size:1.1rem}
header small{font-size:.6rem;opacity:.4;display:block;letter-spacing:.1em;text-transform:uppercase}
header a{color:rgba(255,255,255,.55);font-size:.82rem;text-decoration:none}
header a:hover{color:white}
.body{max-width:1140px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:420px 1fr;gap:1.5rem;align-items:start}
@media(max-width:820px){.body{grid-template-columns:1fr}}

/* CARD */
.card{background:white;border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow-sm)}
.card h2{font-family:var(--font-display);font-size:1.1rem;margin-bottom:1.2rem;padding-bottom:.7rem;border-bottom:1px solid var(--light-gray)}

/* FORM */
.fg{margin-bottom:1rem}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1rem}
label{display:block;font-size:.74rem;font-weight:600;color:var(--gray);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.label-hint{font-size:.68rem;color:var(--coral);font-weight:400;letter-spacing:0;text-transform:none;margin-left:4px}
input[type=text],input[type=number],textarea,select{width:100%;padding:10px 13px;border:1.5px solid var(--light-gray);border-radius:8px;font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .2s;background:white;color:var(--charcoal)}
input:focus,textarea:focus,select:focus{border-color:var(--ocean)}
textarea{resize:vertical;min-height:78px}

/* MULTI-IMAGE UPLOAD */
.upload-section{margin-bottom:1rem}
.upload-drop{border:2px dashed var(--light-gray);border-radius:var(--radius);padding:1.4rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--warm-white);position:relative}
.upload-drop:hover,.upload-drop.drag{border-color:var(--coral);background:#FFF5F6}
.upload-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-drop .ico{font-size:1.6rem;margin-bottom:.3rem}
.upload-drop p{font-size:.82rem;color:var(--gray)}
.upload-drop strong{color:var(--coral)}
.img-previews{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.8rem}
.img-thumb{position:relative;aspect-ratio:3/4;border-radius:8px;overflow:hidden;background:var(--off-white)}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb .rm-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(229,57,53,.85);color:white;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .2s}
.img-thumb .rm-btn:hover{background:var(--danger)}
.img-thumb .main-badge{position:absolute;bottom:4px;left:4px;background:rgba(53,92,125,.85);color:white;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase}
.upload-count{font-size:.75rem;color:var(--gray);margin-top:.4rem}

/* PROGRESS */
.prog-wrap{display:none;margin-top:.6rem}
.prog-bar{height:4px;background:var(--light-gray);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--coral),var(--mauve));transition:width .3s}
.prog-txt{font-size:.72rem;color:var(--gray);margin-top:4px}

/* SUBMIT */
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--coral),var(--mauve));color:white;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:.5rem}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--charcoal);color:white;padding:11px 22px;border-radius:30px;font-size:.86rem;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PRODUCTS LIST */
.prod-list{display:flex;flex-direction:column;gap:.8rem}
.prod-item{display:flex;gap:.9rem;align-items:center;padding:.9rem;background:var(--warm-white);border-radius:8px;border:1px solid var(--light-gray)}
.prod-thumbs{display:flex;gap:4px;flex-shrink:0}
.prod-thumbs img{width:48px;height:60px;object-fit:cover;border-radius:6px;background:var(--off-white)}
.prod-info{flex:1;min-width:0}
.prod-title{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.prod-price{font-size:.8rem;font-weight:700;color:var(--ocean)}
.prod-orig{font-size:.74rem;color:var(--gray);text-decoration:line-through}
.prod-badge{font-size:.68rem;background:linear-gradient(135deg,var(--coral),var(--mauve));color:white;padding:2px 7px;border-radius:6px;font-weight:700}
.prod-category{font-size:.7rem;background:var(--off-white);padding:2px 8px;border-radius:8px;color:var(--gray)}
.prod-likes{font-size:.72rem;color:var(--coral)}
.btn-del{padding:6px 12px;background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:8px;font-family:var(--font-body);font-size:.74rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-del:hover{background:var(--danger);color:white}
.empty-adm{text-align:center;padding:3rem;color:var(--gray);font-size:.88rem}
.spin-wrap{display:flex;justify-content:center;padding:2rem}
.spinner{width:30px;height:30px;border:3px solid var(--light-gray);border-top-color:var(--coral);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="authGate">
  <div class="auth-box">
    <img src="logo.png" alt="Logo" class="auth-logo">
    <h2>Panel de Administración</h2>
    <p>Ingresá tu contraseña para acceder</p>
    <input type="password" class="auth-input" id="pwInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">Ingresar</button>
    <p class="auth-error" id="authErr">Contraseña incorrecta</p>
  </div>
</div>

<div class="admin-wrap" id="adminPanel">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <div><h1>De Todo Un Poco</h1><small>Panel Admin</small></div>
    </div>
    <a href="index.html">← Ver tienda</a>
  </header>

  <div class="body">
    <!-- FORM -->
    <div class="card">
      <h2>Agregar Producto</h2>

      <!-- MULTI IMAGE -->
      <div class="upload-section">
        <label>Imágenes <span class="label-hint">(hasta 8 — la primera es la principal)</span></label>
        <div class="upload-drop" id="uploadDrop">
          <input type="file" id="imgFiles" accept="image/*" multiple onchange="addImages(this.files)">
          <div class="ico">📸</div>
          <p><strong>Hacé clic</strong> o arrastrá las imágenes</p>
          <p style="font-size:.7rem;margin-top:3px;opacity:.6">JPG · PNG · WEBP — hasta 8 fotos</p>
        </div>
        <div class="img-previews" id="imgPreviews"></div>
        <p class="upload-count" id="imgCount"></p>
        <div class="prog-wrap" id="progWrap">
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
          <p class="prog-txt" id="progTxt"></p>
        </div>
      </div>

      <div class="fg">
        <label>Título</label>
        <input type="text" id="titleIn" placeholder="Ej: Vestido floral verano">
      </div>
      <div class="fg">
        <label>Descripción</label>
        <textarea id="descIn" placeholder="Materiales, tallas disponibles, colores..."></textarea>
      </div>

      <!-- PRICES -->
      <div class="fg-row">
        <div>
          <label>Precio de venta (ARS) <span class="label-hint">*</span></label>
          <input type="number" id="priceIn" placeholder="12000" min="0">
        </div>
        <div>
          <label>Precio original <span class="label-hint">opcional — queda tachado</span></label>
          <input type="number" id="origPriceIn" placeholder="15000" min="0">
        </div>
      </div>

      <div class="fg">
        <label>Categoría</label>
        <select id="catIn">
          <option value="mujer">👗 Mujer</option>
          <option value="hombre">👔 Hombre</option>
          <option value="unisex">✨ Unisex</option>
        </select>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="addProduct()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Publicar Producto
      </button>
    </div>

    <!-- LIST -->
    <div class="card">
      <h2>Productos Publicados</h2>
      <div id="prodList"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const ADMIN_PASS    = '123456Aabc';
const CLOUD_NAME    = 'dywosceas';
const UPLOAD_PRESET = 'detodounpoco';
const FB_CONF = {
  apiKey:"AIzaSyClX9La52fBjrENUtumJh6gF40bldAmxaU",
  authDomain:"detodounpocooficialok-6b190.firebaseapp.com",
  projectId:"detodounpocooficialok-6b190",
  storageBucket:"detodounpocooficialok-6b190.firebasestorage.app",
  messagingSenderId:"236091151621",
  appId:"1:236091151621:web:bf63710dbfcc5d40a2d36c"
};

const app = initializeApp(FB_CONF);
const db  = getFirestore(app);

// ── State: pending image Files ────────────────────────────────────
let pendingFiles = [];  // Array of File objects

// ── Auth ──────────────────────────────────────────────────────────
window.login = () => {
  if (document.getElementById('pwInput').value === ADMIN_PASS) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('adminPanel').classList.add('on');
    loadProducts();
  } else {
    document.getElementById('authErr').style.display = 'block';
  }
};

// ── Multi-image handling ──────────────────────────────────────────
window.addImages = (files) => {
  const remaining = 8 - pendingFiles.length;
  const toAdd = Array.from(files).slice(0, remaining);
  toAdd.forEach(f => pendingFiles.push(f));
  renderPreviews();
  // reset input so same files can be re-added if needed
  document.getElementById('imgFiles').value = '';
};

function renderPreviews() {
  const container = document.getElementById('imgPreviews');
  const count     = document.getElementById('imgCount');
  container.innerHTML = '';
  pendingFiles.forEach((file, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'img-thumb';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    const rm = document.createElement('button');
    rm.className = 'rm-btn';
    rm.innerHTML = '×';
    rm.onclick = () => { pendingFiles.splice(i,1); renderPreviews(); };
    thumb.appendChild(img);
    thumb.appendChild(rm);
    if (i === 0) {
      const badge = document.createElement('div');
      badge.className = 'main-badge';
      badge.textContent = 'Principal';
      thumb.appendChild(badge);
    }
    container.appendChild(thumb);
  });
  count.textContent = pendingFiles.length > 0
    ? `${pendingFiles.length} imagen${pendingFiles.length > 1 ? 'es' : ''} seleccionada${pendingFiles.length > 1 ? 's' : ''}`
    : '';
}

// ── Upload one file to Cloudinary ─────────────────────────────────
function uploadOne(file, index, total) {
  return new Promise((res, rej) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', UPLOAD_PRESET);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round((index / total + e.loaded / e.total / total) * 100);
        document.getElementById('progFill').style.width = pct + '%';
        document.getElementById('progTxt').textContent =
          `Subiendo imagen ${index + 1} de ${total}... ${Math.round(e.loaded/e.total*100)}%`;
      }
    };
    xhr.onload = () => xhr.status === 200
      ? res(JSON.parse(xhr.responseText).secure_url)
      : rej(new Error('Error Cloudinary'));
    xhr.onerror = () => rej(new Error('Error de red'));
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
    xhr.send(fd);
  });
}

// ── Add product ───────────────────────────────────────────────────
window.addProduct = async () => {
  const title     = document.getElementById('titleIn').value.trim();
  const desc      = document.getElementById('descIn').value.trim();
  const price     = Number(document.getElementById('priceIn').value);
  const origPrice = Number(document.getElementById('origPriceIn').value) || 0;
  const category  = document.getElementById('catIn').value;

  if (!title || !desc || !price || pendingFiles.length === 0) {
    toast('Completá título, descripción, precio e imágenes', 'err'); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;flex-shrink:0"></div> Subiendo...';
  document.getElementById('progWrap').style.display = 'block';

  try {
    // Upload all images sequentially
    const imageUrls = [];
    for (let i = 0; i < pendingFiles.length; i++) {
      const url = await uploadOne(pendingFiles[i], i, pendingFiles.length);
      imageUrls.push(url);
    }
    document.getElementById('progTxt').textContent = '✅ Imágenes listas, guardando...';

    await addDoc(collection(db, 'products'), {
      title, description: desc,
      price,
      originalPrice: origPrice || null,
      category,
      imageUrl: imageUrls[0],   // backwards compat
      images: imageUrls,        // new multi-image array
      likes: 0,
      createdAt: serverTimestamp()
    });

    toast('¡Producto publicado! 🎉', 'ok');
    // Reset
    pendingFiles = [];
    renderPreviews();
    document.getElementById('titleIn').value    = '';
    document.getElementById('descIn').value     = '';
    document.getElementById('priceIn').value    = '';
    document.getElementById('origPriceIn').value= '';
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('progFill').style.width   = '0';
    loadProducts();
  } catch(e) {
    console.error(e);
    toast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Publicar Producto';
  }
};

// ── Load products list ────────────────────────────────────────────
window.loadProducts = async () => {
  const el = document.getElementById('prodList');
  el.innerHTML = '<div class="spin-wrap"><div class="spinner"></div></div>';
  try {
    const snap = await getDocs(collection(db, 'products'));
    const products = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!products.length) {
      el.innerHTML = '<div class="empty-adm">No hay productos aún. ¡Agregá el primero!</div>';
      return;
    }
    const cats = {mujer:'👗 Mujer',hombre:'👔 Hombre',unisex:'✨ Unisex'};
    el.innerHTML = '<div class="prod-list">' + products.map(p => {
      const imgs = p.images || [p.imageUrl];
      const thumbsHtml = imgs.slice(0,3).map(u =>
        `<img src="${u}" alt="" onerror="this.style.opacity=0">`
      ).join('');
      const priceF = Number(p.price).toLocaleString('es-AR');
      const hasDiscount = p.originalPrice && p.originalPrice > p.price;
      const discPct = hasDiscount ? Math.round((1 - p.price/p.originalPrice)*100) : 0;
      return `
      <div class="prod-item">
        <div class="prod-thumbs">${thumbsHtml}</div>
        <div class="prod-info">
          <div class="prod-title">${p.title}</div>
          <div class="prod-meta">
            <span class="prod-price">$${priceF}</span>
            ${hasDiscount ? `<span class="prod-orig">$${Number(p.originalPrice).toLocaleString('es-AR')}</span><span class="prod-badge">-${discPct}%</span>` : ''}
            <span class="prod-category">${cats[p.category]||p.category}</span>
            <span class="prod-likes">❤️ ${p.likes||0}</span>
            <span style="font-size:.7rem;color:var(--gray)">${imgs.length} foto${imgs.length>1?'s':''}</span>
          </div>
        </div>
        <button class="btn-del" onclick="delProduct('${p.id}')">Eliminar</button>
      </div>`;
    }).join('') + '</div>';
  } catch(e) {
    el.innerHTML = '<div class="empty-adm">Error al cargar.</div>';
  }
};

// ── Delete ────────────────────────────────────────────────────────
window.delProduct = async (id) => {
  if (!confirm('¿Eliminar este producto?')) return;
  try {
    await deleteDoc(doc(db,'products',id));
    toast('Producto eliminado', 'ok');
    loadProducts();
  } catch(e) { toast('Error al eliminar','err'); }
};

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = (type === 'ok' ? '✅ ' : '❌ ') + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

// Drag & drop
const drop = document.getElementById('uploadDrop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag');
  window.addImages(e.dataTransfer.files);
});
</script>
</body>
</html>
