<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — De Todo Un Poco</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--peach:#F8B185;--coral:#F67280;--mauve:#C06C84;--ocean:#355C7D;--warm-white:#FAF8F5;--off-white:#F2EEE8;--charcoal:#1C1C1E;--gray:#6B6B6B;--light-gray:#E8E4DF;--success:#25D366;--danger:#E53935;--font-display:'Playfair Display',serif;--font-body:'Outfit',sans-serif;--radius:12px;--shadow-sm:0 2px 8px rgba(0,0,0,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:#EDEAE5;color:var(--charcoal);min-height:100vh}

/* AUTH GATE */
#authGate{position:fixed;inset:0;z-index:1000;background:var(--charcoal);display:flex;align-items:center;justify-content:center;padding:1rem}
.auth-box{background:white;border-radius:20px;padding:3rem 2.5rem;text-align:center;width:min(400px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.35)}
.auth-logo{height:70px;object-fit:contain;margin-bottom:1.2rem}
.auth-box h2{font-family:var(--font-display);font-size:1.4rem;margin-bottom:.4rem}
.auth-box p{color:var(--gray);font-size:.85rem;margin-bottom:1.8rem}
.auth-input{width:100%;padding:12px 16px;border:1.5px solid var(--light-gray);border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;margin-bottom:1rem;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--coral)}
.btn-primary{width:100%;padding:13px;background:var(--charcoal);color:white;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.auth-error{color:var(--danger);font-size:.82rem;margin-top:.5rem;display:none}

/* LAYOUT */
.admin-wrap{display:none}
.admin-wrap.on{display:block}
header{background:var(--charcoal);color:white;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
header .brand{display:flex;align-items:center;gap:10px}
header img{height:40px}
header h1{font-family:var(--font-display);font-size:1.15rem}
header small{font-size:.65rem;opacity:.45;font-family:var(--font-body);display:block;letter-spacing:.1em;text-transform:uppercase}
header a{color:rgba(255,255,255,.55);font-size:.82rem;text-decoration:none;transition:color .2s}
header a:hover{color:white}
.body{max-width:1100px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:390px 1fr;gap:2rem;align-items:start}
@media(max-width:768px){.body{grid-template-columns:1fr}}

/* CARD */
.card{background:white;border-radius:var(--radius);padding:1.8rem;box-shadow:var(--shadow-sm)}
.card h2{font-family:var(--font-display);font-size:1.15rem;margin-bottom:1.4rem;padding-bottom:.8rem;border-bottom:1px solid var(--light-gray)}

/* FORM */
.fg{margin-bottom:1.1rem}
label{display:block;font-size:.76rem;font-weight:600;color:var(--gray);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
input[type=text],input[type=number],textarea,select{width:100%;padding:11px 14px;border:1.5px solid var(--light-gray);border-radius:8px;font-family:var(--font-body);font-size:.9rem;outline:none;transition:border-color .2s;background:white;color:var(--charcoal)}
input:focus,textarea:focus,select:focus{border-color:var(--ocean)}
textarea{resize:vertical;min-height:82px}

/* UPLOAD */
.upload-area{border:2px dashed var(--light-gray);border-radius:var(--radius);padding:1.8rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--warm-white);position:relative}
.upload-area:hover,.upload-area.drag{border-color:var(--coral);background:#FFF5F6}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:1.8rem;margin-bottom:.4rem}
.upload-area p{font-size:.83rem;color:var(--gray)}
.upload-area strong{color:var(--coral)}
#imgPreview{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;margin-top:1rem;display:none;box-shadow:var(--shadow-sm)}
.prog-wrap{margin-top:.6rem;display:none}
.prog-bar{height:4px;background:var(--light-gray);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--coral),var(--mauve));transition:width .3s}
.prog-txt{font-size:.74rem;color:var(--gray);margin-top:4px}

/* SUBMIT */
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--coral),var(--mauve));color:white;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(110px);background:var(--charcoal);color:white;padding:12px 24px;border-radius:30px;font-size:.88rem;font-weight:500;z-index:9999;transition:transform .3s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PRODUCTS LIST */
.prod-list{display:flex;flex-direction:column;gap:.9rem}
.prod-item{display:flex;gap:1rem;align-items:center;padding:.9rem;background:var(--warm-white);border-radius:8px;border:1px solid var(--light-gray);transition:box-shadow .2s}
.prod-item:hover{box-shadow:var(--shadow-sm)}
.prod-item img{width:62px;height:78px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--off-white)}
.prod-info{flex:1;min-width:0}
.prod-title{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.prod-price{font-size:.8rem;font-weight:700;color:var(--ocean)}
.prod-category{font-size:.7rem;background:var(--off-white);padding:2px 8px;border-radius:8px;color:var(--gray)}
.prod-likes{font-size:.74rem;color:var(--coral)}
.btn-del{padding:6px 13px;background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:8px;font-family:var(--font-body);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-del:hover{background:var(--danger);color:white}
.empty-adm{text-align:center;padding:3rem;color:var(--gray);font-size:.9rem}
.spin-wrap{display:flex;justify-content:center;padding:2rem}
.spinner{width:32px;height:32px;border:3px solid var(--light-gray);border-top-color:var(--coral);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="authGate">
  <div class="auth-box">
    <img src="logo.png" alt="Logo" class="auth-logo">
    <h2>Panel de Administración</h2>
    <p>Ingresá tu contraseña para acceder</p>
    <input type="password" class="auth-input" id="pwInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">Ingresar</button>
    <p class="auth-error" id="authErr">Contraseña incorrecta</p>
  </div>
</div>

<div class="admin-wrap" id="adminPanel">
  <header>
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <div><h1>De Todo Un Poco</h1><small>Panel Admin</small></div>
    </div>
    <a href="index.html">← Ver tienda</a>
  </header>

  <div class="body">
    <!-- FORM -->
    <div class="card">
      <h2>Agregar Producto</h2>
      <div class="fg">
        <label>Imagen</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="imgFile" accept="image/*" onchange="previewImg(this)">
          <div id="uploadPH">
            <div class="upload-icon">📸</div>
            <p><strong>Hacé clic</strong> o arrastrá la imagen</p>
            <p style="font-size:.72rem;margin-top:4px;opacity:.6">JPG · PNG · WEBP — máx 10 MB</p>
          </div>
          <img id="imgPreview" src="" alt="Preview">
        </div>
        <div class="prog-wrap" id="progWrap">
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
          <p class="prog-txt" id="progTxt">Subiendo...</p>
        </div>
      </div>
      <div class="fg"><label>Título</label><input type="text" id="titleIn" placeholder="Ej: Vestido floral verano" required></div>
      <div class="fg"><label>Descripción</label><textarea id="descIn" placeholder="Materiales, tallas disponibles, colores..." required></textarea></div>
      <div class="fg"><label>Precio (ARS)</label><input type="number" id="priceIn" placeholder="15000" min="0" required></div>
      <div class="fg">
        <label>Categoría</label>
        <select id="catIn">
          <option value="mujer">👗 Mujer</option>
          <option value="hombre">👔 Hombre</option>
          <option value="unisex">✨ Unisex</option>
        </select>
      </div>
      <button type="button" class="btn-submit" id="submitBtn" onclick="addProduct()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Publicar Producto
      </button>
    </div>

    <!-- LIST -->
    <div class="card">
      <h2>Productos Publicados</h2>
      <div id="prodList"><div class="spin-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ── Config ───────────────────────────────────────────────────────
const ADMIN_PASS     = '123456Aabc';
const CLOUD_NAME     = 'dywosceas';
const UPLOAD_PRESET  = 'detodounpoco';
const FIREBASE_CONF  = {
  apiKey:            "AIzaSyClX9La52fBjrENUtumJh6gF40bldAmxaU",
  authDomain:        "detodounpocooficialok-6b190.firebaseapp.com",
  projectId:         "detodounpocooficialok-6b190",
  storageBucket:     "detodounpocooficialok-6b190.firebasestorage.app",
  messagingSenderId: "236091151621",
  appId:             "1:236091151621:web:bf63710dbfcc5d40a2d36c"
};

const app = initializeApp(FIREBASE_CONF);
const db  = getFirestore(app);

// ── Auth ─────────────────────────────────────────────────────────
window.login = () => {
  if (document.getElementById('pwInput').value === ADMIN_PASS) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('adminPanel').classList.add('on');
    loadProducts();
  } else {
    document.getElementById('authErr').style.display = 'block';
  }
};

// ── Preview ──────────────────────────────────────────────────────
window.previewImg = (input) => {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('imgPreview');
    prev.src = e.target.result;
    prev.style.display = 'block';
    document.getElementById('uploadPH').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
};

// ── Upload Cloudinary ─────────────────────────────────────────────
function uploadCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  document.getElementById('progWrap').style.display = 'block';

  return new Promise((res, rej) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        document.getElementById('progFill').style.width = pct + '%';
        document.getElementById('progTxt').textContent = `Subiendo imagen... ${pct}%`;
      }
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        document.getElementById('progTxt').textContent = '✅ Imagen lista';
        res(JSON.parse(xhr.responseText).secure_url);
      } else {
        rej(new Error('Error Cloudinary: ' + xhr.responseText));
      }
    };
    xhr.onerror = () => rej(new Error('Error de red'));
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
    xhr.send(fd);
  });
}

// ── Add product ───────────────────────────────────────────────────
window.addProduct = async () => {
  const title    = document.getElementById('titleIn').value.trim();
  const desc     = document.getElementById('descIn').value.trim();
  const price    = document.getElementById('priceIn').value;
  const category = document.getElementById('catIn').value;
  const fileInp  = document.getElementById('imgFile');

  if (!title || !desc || !price || !fileInp.files[0]) {
    toast('Completá todos los campos y agregá una imagen', 'err'); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> Publicando...';

  try {
    const imageUrl = await uploadCloudinary(fileInp.files[0]);
    await addDoc(collection(db, 'products'), {
      title, description: desc, price: Number(price),
      category, imageUrl, likes: 0, createdAt: serverTimestamp()
    });
    toast('¡Producto publicado! 🎉', 'ok');
    // Reset form
    document.getElementById('titleIn').value = '';
    document.getElementById('descIn').value  = '';
    document.getElementById('priceIn').value = '';
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('uploadPH').style.display  = 'block';
    document.getElementById('progWrap').style.display  = 'none';
    document.getElementById('progFill').style.width    = '0';
    fileInp.value = '';
    loadProducts();
  } catch(e) {
    console.error(e);
    toast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Publicar Producto';
  }
};

// ── Load products list ────────────────────────────────────────────
window.loadProducts = async () => {
  const el = document.getElementById('prodList');
  el.innerHTML = '<div class="spin-wrap"><div class="spinner"></div></div>';
  try {
    const snap = await getDocs(collection(db, 'products'));
    const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!products.length) { el.innerHTML = '<div class="empty-adm">No hay productos aún. ¡Agregá el primero!</div>'; return; }

    const cats = { mujer:'👗 Mujer', hombre:'👔 Hombre', unisex:'✨ Unisex' };
    el.innerHTML = '<div class="prod-list">' + products.map(p => `
      <div class="prod-item">
        <img src="${p.imageUrl}" alt="${p.title}" onerror="this.style.background='#eee'">
        <div class="prod-info">
          <div class="prod-title">${p.title}</div>
          <div class="prod-meta">
            <span class="prod-price">$${Number(p.price).toLocaleString('es-AR')}</span>
            <span class="prod-category">${cats[p.category]||p.category}</span>
            <span class="prod-likes">❤️ ${p.likes||0}</span>
          </div>
        </div>
        <button class="btn-del" onclick="delProduct('${p.id}')">Eliminar</button>
      </div>`).join('') + '</div>';
  } catch(e) {
    el.innerHTML = '<div class="empty-adm">Error al cargar.</div>';
  }
};

// ── Delete ────────────────────────────────────────────────────────
window.delProduct = async (id) => {
  if (!confirm('¿Eliminar este producto?')) return;
  try {
    await deleteDoc(doc(db, 'products', id));
    toast('Producto eliminado', 'ok');
    loadProducts();
  } catch(e) { toast('Error al eliminar', 'err'); }
};

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = (type === 'ok' ? '✅ ' : '❌ ') + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}
window.toast = toast;
</script>
</body>
</html>
